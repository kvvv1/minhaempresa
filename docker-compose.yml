services:
  postgres:
    image: postgres:16-alpine
    container_name: vida-sa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vida_sa
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vida_sa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
